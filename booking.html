<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Static.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="Static.html"><i class="bi bi-camera"></i> Photographer</a>
  </div>
</nav>

<!-- Booking Section -->
<section class="booking-section py-5">
  <div class="container">
    <h2 class="text-center text-danger mb-4">Book a Session</h2>
    <p class="text-center text-light mb-5">Let’s capture your special moments</p>

    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 col-12">

        <form action="https://formsubmit.co/anshuldahake06@gmail.com" method="POST" class="booking-form">

            <input type="hidden" name="_subject" value="New Booking Request!">
            <input type="hidden" name="_captcha" value="false">

            <input type="text" name="name" placeholder="Your Name" required class="form-control mb-3">

            <input type="email" name="email" placeholder="Email Address" required class="form-control mb-3">

            <input type="tel" name="phone" placeholder="Phone Number" required class="form-control mb-3">

            <select name="service" class="form-control mb-3">
                <option>Select Service</option>
                <option>Portrait Photography</option>
                <option>Event Photography</option>
                <option>Wedding Shoot</option>
                <option>Product Photography</option><option>Photo Editing</option>
                <option>Creative Shoots</option>
            </select>

            <input type="date" name="date" class="form-control mb-3">

            <textarea name="message" placeholder="Your Message" rows="4" class="form-control mb-3"></textarea>

            <button type="submit" class="btn btn-outline-danger w-100">Submit Booking</button>

        </form>
      </div>
    </div>
  </div>
</section>

<!-- Contact Section Start -->
    <section id="contact" class="bg-dark text-white py-5">
        <div class="container text-center">
            <h2>Contact</h2>
            <p class="info">Email: anshuldahake06@gmail.com
                <br>
                Contact: +91 7385134201
            </p>
            <p class="info">LinkedIn: <a href="https://www.linkedin.com/in/anshul-dahake-607082336/"> Anshul Dahake | LinkedIn Profile</a></p>
        </div>
    </section>
    <!-- Contact Section End -->

     <!-- Footer Section Start -->
    <footer class="text-center bg-black text-white p-2">
        © 2026 Anshul Dahake, All rights are reserved.
    </footer>
    <!-- Footer Section End -->

</body>
</html>
